<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="wispGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b6e3d4" />
      <stop offset="100%" stop-color="#7eb5a6" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Sage green background glow -->
  <circle cx="50" cy="50" r="32" fill="#7eb5a6" opacity="0.25" filter="url(#glow)"/>

  <!-- Spirit body - cute soft teardrop / wisp shape -->
  <path d="M 50 16 C 68 16 75 34 72 54 C 69 74 54 86 50 86 C 46 86 31 74 28 54 C 25 34 32 16 50 16 Z" fill="url(#wispGrad)" stroke="#e8dcc4" stroke-width="1.5" />

  <!-- Cute leafy ears or warm amber leaf on top -->
  <path d="M 50 16 C 50 8 44 4 41 8 C 39 12 45 16 50 16 Z" fill="#c49a6c" />
  <path d="M 50 16 C 50 8 56 4 59 8 C 61 12 55 16 50 16 Z" fill="#c49a6c" />

  <!-- Cream belly patch -->
  <ellipse cx="50" cy="65" rx="14" ry="11" fill="#fffdf8" opacity="0.8" />

  <!-- Warm amber belly markings (Totoro-like chevron arrows) -->
  <path d="M 45 61 L 50 58 L 55 61" fill="none" stroke="#c49a6c" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 41 67 L 46 64 L 51 67" fill="none" stroke="#c49a6c" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 49 67 L 54 64 L 59 67" fill="none" stroke="#c49a6c" stroke-width="1.5" stroke-linecap="round" />

  <!-- Cute friendly eyes -->
  <circle cx="40" cy="45" r="4.5" fill="#4a3728" />
  <circle cx="60" cy="45" r="4.5" fill="#4a3728" />
  <!-- Highlights -->
  <circle cx="38.5" cy="43.5" r="1.5" fill="#ffffff" />
  <circle cx="58.5" cy="43.5" r="1.5" fill="#ffffff" />

  <!-- Smiling mouth -->
  <path d="M 48 50 Q 50 52 52 50" fill="none" stroke="#4a3728" stroke-width="1.5" stroke-linecap="round" />

  <!-- Rosy blush -->
  <ellipse cx="32" cy="51" rx="4" ry="2.5" fill="#e8b4a0" opacity="0.8" />
  <ellipse cx="68" cy="51" rx="4" ry="2.5" fill="#e8b4a0" opacity="0.8" />
</svg>
