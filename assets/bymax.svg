<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="coralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f29c85" />
      <stop offset="100%" stop-color="#e28a75" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#7a6255" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Spikes on back -->
  <path d="M 28 32 Q 22 25 32 26" fill="#c49a6c" />
  <path d="M 72 32 Q 78 25 68 26" fill="#c49a6c" />

  <!-- Dragon Head/Face (soft rounded pear shape) -->
  <path d="M 30 50 C 30 32 70 32 70 50 C 70 65 30 65 30 50 Z" fill="url(#coralGrad)" filter="url(#shadow)" stroke="#e8dcc4" stroke-width="1" />

  <!-- Dragon Horns (cute rounded) -->
  <path d="M 38 34 C 36 24 44 26 44 32" fill="none" stroke="#c49a6c" stroke-width="4.5" stroke-linecap="round" />
  <path d="M 62 34 C 64 24 56 26 56 32" fill="none" stroke="#c49a6c" stroke-width="4.5" stroke-linecap="round" />

  <!-- Dragon Body -->
  <path d="M 33 60 C 33 52 67 52 67 60 L 62 82 C 62 84 38 84 38 82 Z" fill="url(#coralGrad)" filter="url(#shadow)" />

  <!-- Cream Belly (spans down chest) -->
  <path d="M 42 60 C 42 60 50 68 50 68 C 50 68 58 60 58 60 L 54 82 C 54 82 50 83 50 83 C 50 83 46 82 46 82 Z" fill="#fffdf8" />

  <!-- Cute big friendly eyes -->
  <circle cx="41" cy="46" r="4.5" fill="#4a3728" />
  <circle cx="59" cy="46" r="4.5" fill="#4a3728" />
  <!-- Eye highlights -->
  <circle cx="39.5" cy="44.5" r="1.5" fill="#ffffff" />
  <circle cx="57.5" cy="44.5" r="1.5" fill="#ffffff" />

  <!-- Rosy cheeks (blush) -->
  <ellipse cx="33" cy="51" rx="4" ry="2" fill="#e8b4a0" opacity="0.8" />
  <ellipse cx="67" cy="51" rx="4" ry="2" fill="#e8b4a0" opacity="0.8" />

  <!-- Smiling mouth -->
  <path d="M 48 51 Q 50 53 52 51" fill="none" stroke="#4a3728" stroke-width="1.5" stroke-linecap="round" />

  <!-- Tiny nostrils -->
  <circle cx="48" cy="48" r="0.8" fill="#4a3728" opacity="0.6" />
  <circle cx="52" cy="48" r="0.8" fill="#4a3728" opacity="0.6" />
</svg>
