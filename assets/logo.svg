<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2c94c" />
      <stop offset="100%" stop-color="#c49a6c" />
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a2d2c4" />
      <stop offset="100%" stop-color="#7eb5a6" />
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#faf4e8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#7a6255" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Cute wings (sage leaves) -->
  <g filter="url(#shadow)">
    <!-- Left Wing -->
    <path d="M 24 50 C 5 35 10 65 24 58 Z" fill="url(#wingGrad)" />
    <!-- Right Wing -->
    <path d="M 76 50 C 95 35 90 65 76 58 Z" fill="url(#wingGrad)" />
    <!-- Wing connections -->
    <rect x="22" y="52" width="6" height="3" rx="1" fill="#7a6255" opacity="0.6" />
    <rect x="72" y="52" width="6" height="3" rx="1" fill="#7a6255" opacity="0.6" />
  </g>

  <!-- Golden Drone Body -->
  <circle cx="50" cy="55" r="26" fill="url(#bodyGrad)" filter="url(#shadow)" />
  
  <!-- Top Cute Antenna / Loop -->
  <path d="M 50 29 L 50 23 C 50 17 46 15 43 17" fill="none" stroke="#c49a6c" stroke-width="3" stroke-linecap="round" />
  <circle cx="43" cy="17" r="3.5" fill="#e8b4a0" />

  <!-- Cute mechanical feet (soft rounded) -->
  <path d="M 38 78 C 38 85 41 87 37 87" fill="none" stroke="#7a6255" stroke-width="3.5" stroke-linecap="round" />
  <path d="M 62 78 C 62 85 59 87 63 87" fill="none" stroke="#7a6255" stroke-width="3.5" stroke-linecap="round" />

  <!-- White belly area -->
  <ellipse cx="50" cy="63" rx="16" ry="12" fill="#fffdf8" opacity="0.75" />

  <!-- Cream Lens / Eye Core -->
  <circle cx="50" cy="50" r="14" fill="url(#lensGrad)" filter="url(#shadow)" stroke="#e8dcc4" stroke-width="1.5" />
  <circle cx="50" cy="50" r="9" fill="#4a3728" />
  
  <!-- Shiny highlights on eye -->
  <circle cx="47" cy="47" r="3" fill="#ffffff" />
  <circle cx="53" cy="53" r="1" fill="#ffffff" />

  <!-- Rosy cheeks (blush) -->
  <ellipse cx="32" cy="58" rx="4.5" ry="3" fill="#e8b4a0" opacity="0.8" />
  <ellipse cx="68" cy="58" rx="4.5" ry="3" fill="#e8b4a0" opacity="0.8" />
</svg>
