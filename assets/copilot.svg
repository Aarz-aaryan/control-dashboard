<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="botGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bce3ed" />
      <stop offset="100%" stop-color="#8bbccc" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#7a6255" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Sky blue body/head -->
  <!-- Cute head -->
  <rect x="24" y="22" width="52" height="42" rx="16" fill="url(#botGrad)" filter="url(#shadow)" stroke="#e8dcc4" stroke-width="1.5" />
  
  <!-- Cream screen face -->
  <rect x="30" y="28" width="40" height="30" rx="10" fill="#fffdf8" stroke="#e8dcc4" stroke-width="1.2" />

  <!-- Antenna with sky blue ball -->
  <path d="M 50 22 L 50 12" fill="none" stroke="#7a6255" stroke-width="2.5" stroke-linecap="round" />
  <circle cx="50" cy="11" r="3.5" fill="#8bbccc" />

  <!-- Cute ears (cylinders) -->
  <rect x="18" y="36" width="6" height="14" rx="3" fill="#c49a6c" />
  <rect x="76" y="36" width="6" height="14" rx="3" fill="#c49a6c" />

  <!-- Robot Body -->
  <path d="M 33 64 C 33 60 67 60 67 64 L 63 80 C 63 83 37 83 37 80 Z" fill="url(#botGrad)" filter="url(#shadow)" stroke="#e8dcc4" stroke-width="1" />
  
  <!-- Center Cream Heart / Screen on chest -->
  <path d="M 50 75 C 50 75 46 71 46 69 C 46 67.5 47.5 66 49 66 C 49.8 66 50 67 50 67 C 50 67 50.2 66 51 66 C 52.5 66 54 67.5 54 69 C 54 71 50 75 50 75 Z" fill="#e8b4a0" />

  <!-- Cute big friendly screen eyes -->
  <circle cx="42" cy="41" r="4.5" fill="#8bbccc" />
  <circle cx="58" cy="41" r="4.5" fill="#8bbccc" />
  <!-- Shiny highlights -->
  <circle cx="40.5" cy="39.5" r="1.5" fill="#ffffff" />
  <circle cx="56.5" cy="39.5" r="1.5" fill="#ffffff" />

  <!-- Happy mouth -->
  <path d="M 47 48 Q 50 51 53 48" fill="none" stroke="#7a6255" stroke-width="1.5" stroke-linecap="round" />

  <!-- Rosy blushing cheeks -->
  <ellipse cx="36" cy="46" rx="3" ry="1.8" fill="#e8b4a0" opacity="0.8" />
  <ellipse cx="64" cy="46" rx="3" ry="1.8" fill="#e8b4a0" opacity="0.8" />

  <!-- Tiny arms -->
  <path d="M 32 68 C 26 71 28 78 33 74" fill="none" stroke="#8bbccc" stroke-width="3" stroke-linecap="round" />
  <path d="M 68 68 C 74 71 72 78 67 74" fill="none" stroke="#8bbccc" stroke-width="3" stroke-linecap="round" />
</svg>
