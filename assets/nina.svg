  <path d="M 45 62 Q 47 65 50 62 Q 53 65 55 62" stroke="#8bbccc" stroke-width="2" stroke-linecap="round" fill="none" />
  <path d="M 40 70 Q 43 73 45 70 Q 48 73 50 70 Q 52 73 55 70 Q 58 73 60 70" stroke="#8bbccc" stroke-width="2" stroke-linecap="round" fill="none" />
