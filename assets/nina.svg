<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="foxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8b4a0" />
      <stop offset="100%" stop-color="#d89a8a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#7a6255" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Fox Ears -->
  <g filter="url(#shadow)">
    <!-- Left Ear -->
    <path d="M 25 32 L 20 12 L 40 24 Z" fill="url(#foxGrad)" />
    <path d="M 28 29 L 24 16 L 36 24 Z" fill="#fffdf8" />
    
    <!-- Right Ear -->
    <path d="M 75 32 L 80 12 L 60 24 Z" fill="url(#foxGrad)" />
    <path d="M 72 29 L 76 16 L 64 24 Z" fill="#fffdf8" />
  </g>

  <!-- Fox Face (Curious oval with cheeks) -->
  <ellipse cx="50" cy="46" rx="25" ry="21" fill="url(#foxGrad)" filter="url(#shadow)" stroke="#e8dcc4" stroke-width="1" />

  <!-- Cream Cheeks (fluffy sides) -->
  <path d="M 26 48 C 22 55 35 62 42 58 C 42 58 50 63 50 63 C 50 63 58 58 58 58 C 65 62 78 55 74 48 Z" fill="#fffdf8" />

  <!-- Fox Body -->
  <path d="M 35 65 C 35 58 65 58 65 65 L 60 82 C 60 84 40 84 40 82 Z" fill="url(#foxGrad)" filter="url(#shadow)" />

  <!-- Cream Chest -->
  <path d="M 42 64 C 42 64 50 72 50 72 C 50 72 58 64 58 64 L 54 80 C 54 80 50 82 50 82 C 50 82 46 80 46 80 Z" fill="#fffdf8" />

  <!-- Curious Eyes -->
  <circle cx="39" cy="42" r="5" fill="#4a3728" />
  <circle cx="61" cy="42" r="5" fill="#4a3728" />
  <!-- Highlights -->
  <circle cx="37.5" cy="40.5" r="1.8" fill="#ffffff" />
  <circle cx="59.5" cy="40.5" r="1.8" fill="#ffffff" />

  <!-- Nose -->
  <polygon points="50,50 47,47 53,47" fill="#4a3728" />

  <!-- Happy Mouth -->
  <path d="M 47 53 Q 50 55 53 53" fill="none" stroke="#4a3728" stroke-width="1.2" stroke-linecap="round" />

  <!-- Blush -->
  <ellipse cx="31" cy="47" rx="3.5" ry="2" fill="#e28a75" opacity="0.75" />
  <ellipse cx="69" cy="47" rx="3.5" ry="2" fill="#e28a75" opacity="0.75" />
</svg>
