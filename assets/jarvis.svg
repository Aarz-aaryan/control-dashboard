<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="lavGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cbbfe9" />
      <stop offset="100%" stop-color="#b0a3d4" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#7a6255" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Lavender head -->
  <rect x="25" y="22" width="50" height="40" rx="14" fill="url(#lavGrad)" filter="url(#shadow)" stroke="#e8dcc4" stroke-width="1" />

  <!-- Cream screen face -->
  <rect x="31" y="28" width="38" height="28" rx="8" fill="#fffdf8" stroke="#e8dcc4" stroke-width="1" />

  <!-- Cute little automation antenna (lavender ball + loop) -->
  <path d="M 50 22 L 50 14" fill="none" stroke="#7a6255" stroke-width="2.5" stroke-linecap="round" />
  <circle cx="50" cy="12" r="3.5" fill="#c49a6c" />

  <!-- Lavender side dials/ears -->
  <circle cx="21" cy="42" r="4.5" fill="#b0a3d4" stroke="#e8dcc4" stroke-width="1" />
  <circle cx="79" cy="42" r="4.5" fill="#b0a3d4" stroke="#e8dcc4" stroke-width="1" />

  <!-- Robot body -->
  <rect x="34" y="64" width="32" height="18" rx="8" fill="url(#lavGrad)" filter="url(#shadow)" stroke="#e8dcc4" stroke-width="1" />

  <!-- Cream belly badge (like a bulb or gear) -->
  <circle cx="50" cy="73" r="5" fill="#fffdf8" />
  <circle cx="50" cy="73" r="2.5" fill="#c49a6c" />

  <!-- Big happy blue eyes -->
  <circle cx="43" cy="40" r="4" fill="#7eb5a6" />
  <circle cx="57" cy="40" r="4" fill="#7eb5a6" />
  <!-- Eye highlights -->
  <circle cx="41.5" cy="38.5" r="1.3" fill="#ffffff" />
  <circle cx="55.5" cy="38.5" r="1.3" fill="#ffffff" />

  <!-- Happy mouth -->
  <path d="M 47 47 Q 50 49 53 47" fill="none" stroke="#7a6255" stroke-width="1.5" stroke-linecap="round" />

  <!-- Blush -->
  <ellipse cx="36" cy="45" rx="2.5" ry="1.5" fill="#e8b4a0" opacity="0.8" />
  <ellipse cx="64" cy="45" rx="2.5" ry="1.5" fill="#e8b4a0" opacity="0.8" />
</svg>
