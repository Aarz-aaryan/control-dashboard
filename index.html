<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Multi-Agent Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0e14; /* Deep dark near-black background */
            --card-bg: rgba(14, 20, 30, 0.7); /* Cozy dark glass */
            --card-border: rgba(196, 154, 108, 0.12); /* Subtle gold edge */
            
            /* Ghibli warm color palette */
            --gold: #c49a6c;
            --sage: #7eb5a6;
            --sky: #8bbccc;
            --cream: #f5f0e6;
            --terracotta: #d97d64;
            --lime: #8fcb9e; /* Cozy leaf green */
            
            --text-main: #f5f0e6; /* Warm cream */
            --text-muted: rgba(245, 240, 230, 0.55); /* Muted warm cream */
            --glass-shadow: rgba(0, 0, 0, 0.65);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(196, 154, 108, 0.08) 0%, transparent 60%),
                radial-gradient(circle at 15% 30%, rgba(126, 181, 166, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 85% 70%, rgba(139, 188, 204, 0.03) 0%, transparent 50%);
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient shimmer sweep overlay */
        .shimmer-overlay {
            position: fixed;
            top: -50%; left: -50%; right: -50%; bottom: -50%;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(196, 154, 108, 0.015) 25%,
                rgba(126, 181, 166, 0.01) 50%,
                rgba(139, 188, 204, 0.01) 75%,
                rgba(255, 255, 255, 0) 100%
            );
            animation: shimmerSweep 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 998;
        }

        @keyframes shimmerSweep {
            0% { transform: translateY(-10%) rotate(0deg); }
            50% { transform: translateY(10%) rotate(2deg); }
            100% { transform: translateY(-10%) rotate(0deg); }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }

        /* ── Header ── */
        header {
            text-align: center;
            margin-bottom: 48px;
        }

        header .logo-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
            animation: float 6s ease-in-out infinite;
        }

        header .logo {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 0 12px rgba(196, 154, 108, 0.3));
            z-index: 2;
            position: relative;
        }

        .logo-glow {
            position: absolute;
            top: 50%; left: 50%;
            width: 120px; height: 120px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(196, 154, 108, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(1deg); }
        }

        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.2rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 0.02em;
            text-shadow: 0 0 15px rgba(196, 154, 108, 0.35);
            margin-bottom: 6px;
        }

        header p {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--gold);
            text-shadow: 0 0 8px rgba(196, 154, 108, 0.2);
            margin-bottom: 24px;
        }

        /* Cozy line divider */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            max-width: 320px;
            margin: 0 auto;
            opacity: 0.85;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        .divider span {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            font-style: italic;
            color: var(--sage);
            letter-spacing: 0.05em;
            font-weight: 500;
            text-shadow: 0 0 8px rgba(126, 181, 166, 0.2);
        }

        /* ── Tree Layout Structure ── */
        .tree-container {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 72px; /* space between rows */
            width: 100%;
            max-width: 1200px;
            margin: 40px auto 0;
            padding: 20px 0;
        }

        .tree-row {
            display: flex;
            justify-content: center;
            gap: 48px; /* space between cards in the same row */
            position: relative;
            z-index: 2;
        }

        .tree-node {
            display: flex;
            justify-content: center;
            width: 290px;
            flex-shrink: 0;
        }
        
        .tree-lines-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .tree-vine {
            filter: drop-shadow(0 0 3px rgba(196, 154, 108, 0.15));
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: growVine 2s ease-out forwards;
        }
        
        @keyframes growVine {
            to { stroke-dashoffset: 0; }
        }

        /* ── Card Styling ── */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.2px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.55),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
            animation: cardIn 0.8s cubic-bezier(0.19, 1, 0.22, 1) both;
            color: var(--text-main);
            z-index: 1;
            width: 100%;
        }

        /* Shimmer on card */
        .card-shimmer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                120deg,
                transparent 30%,
                rgba(196, 154, 108, 0.06) 40%,
                rgba(245, 240, 230, 0.02) 50%,
                transparent 70%
            );
            transform: skewX(-20deg);
            left: -150%;
            transition: none;
            pointer-events: none;
            z-index: 3;
        }
        .card:hover .card-shimmer {
            animation: hoverShimmer 2.2s ease-out infinite;
        }
        @keyframes hoverShimmer {
            0% { left: -150%; }
            100% { left: 150%; }
        }

        /* Soft warm boundary glow border on hover */
        .card::before {
            content: '';
            position: absolute;
            inset: -1.2px;
            border-radius: 16px;
            background: linear-gradient(120deg, var(--gold), var(--sage), var(--sky), var(--gold));
            background-size: 300% 300%;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
            animation: holoShift 6s linear infinite;
        }
        .card:hover::before {
            opacity: 0.4;
        }
        @keyframes holoShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(22, 28, 38, 0.85);
            border-color: rgba(196, 154, 108, 0.25);
            box-shadow:
                0 16px 40px rgba(0, 0, 0, 0.65),
                0 0 25px var(--agent-dim);
        }

        /* Sparkle mark on top right */
        .card::after {
            content: '✦';
            font-size: 0.8rem;
            position: absolute;
            top: 12px;
            right: 14px;
            color: var(--gold);
            opacity: 0.3;
            transition: all 0.4s ease;
        }
        .card:hover::after {
            opacity: 0.85;
            text-shadow: 0 0 6px var(--gold);
        }

        /* ── Card top row ── */
        .card-top {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 22px;
        }

        /* Boundary status rings around avatar */
        .avatar-container {
            position: relative;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: #0d121f;
            border: 1.5px solid var(--agent-color);
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s ease, border-color 0.4s ease;
            z-index: 2;
        }
        .card:hover .avatar {
            transform: scale(1.04) rotate(1deg);
        }

        .avatar img {
            width: 42px;
            height: 42px;
            display: block;
            z-index: 3;
        }

        /* Non-animated boundary for IDLE agents */
        .status-arc {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1.5px solid transparent;
            border-top-color: var(--agent-color);
            border-bottom-color: var(--agent-color);
            opacity: 0.25;
            z-index: 1;
            transition: all 0.4s ease;
        }
        .status-arc-inner {
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            border: 1px dashed var(--agent-color);
            opacity: 0.18;
            z-index: 1;
            transition: all 0.4s ease;
        }
        .card:hover .status-arc {
            opacity: 0.75;
            filter: drop-shadow(0 0 4px var(--agent-color));
        }

        /* Circular boundary animations ONLY for ACTIVE agents */
        .card.active-core .status-arc {
            opacity: 0.85;
            animation: arcRotate 8s linear infinite;
            filter: drop-shadow(0 0 5px var(--agent-color));
        }
        .card.active-core .status-arc-inner {
            opacity: 0.6;
            animation: arcRotateBack 4.5s linear infinite;
        }

        @keyframes arcRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes arcRotateBack {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        .card-info {
            flex: 1;
            min-width: 0;
        }

        .card-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 0 5px rgba(196, 154, 108, 0.15);
        }

        .card-role {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.72rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 3px;
            font-weight: 500;
        }

        /* ── Status indicator dot ── */
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-left: auto;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .dot.working {
            background: var(--lime);
            border-color: var(--lime);
            box-shadow: 
                0 0 8px var(--lime),
                0 0 15px var(--lime);
            animation: pulseGlow 2s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.7; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.15); }
        }

        /* ── Status Row ── */
        .status-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 8px;
            font-family: 'Share Tech Mono', monospace;
        }

        .status-label {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-muted);
            transition: color 0.3s;
        }
        .status-label.working {
            color: var(--lime);
            text-shadow: 0 0 6px rgba(143, 203, 158, 0.4);
        }

        .time-ago {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
            font-weight: 600;
        }

        /* ── Progress/Activity Bar ── */
        .bar-track {
            height: 6px;
            border-radius: 4px;
            background: rgba(196, 154, 108, 0.05);
            border: 1px solid rgba(196, 154, 108, 0.08);
            margin-top: 10px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--agent-color), var(--gold));
            transition: width 1.5s cubic-bezier(0.1, 0.8, 0.2, 1);
            box-shadow: 0 0 8px var(--agent-color);
        }

        /* ── Card footer ── */
        .card-foot {
            margin-top: 18px;
            padding-top: 12px;
            border-top: 1px solid rgba(196, 154, 108, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Share Tech Mono', monospace;
        }
        .foot-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.10em;
        }
        .foot-value {
            font-size: 0.68rem;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
            font-weight: 600;
        }

        /* ── Floating particles (Forest soot sprites / warm fireflies) ── */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
            animation-fill-mode: forwards;
        }
        .particle.star {
            animation-name: floatStar;
        }
        .particle.orb {
            animation-name: floatOrb;
        }
        
        @keyframes floatStar {
            0% { transform: translateY(105vh) translateX(0) scale(0.6); opacity: 0; }
            10% { opacity: 0.6; }
            50% { transform: translateY(50vh) translateX(15px) scale(0.9); opacity: 0.8; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) translateX(-5px) scale(0.7); opacity: 0; }
        }

        @keyframes floatOrb {
            0% { transform: translateY(105vh) translateX(0) scale(0.8); opacity: 0; }
            15% { opacity: 0.4; }
            50% { transform: translateY(50vh) translateX(-20px) scale(1.05); opacity: 0.6; }
            85% { opacity: 0.4; }
            100% { transform: translateY(-10vh) translateX(10px) scale(0.85); opacity: 0; }
        }

        /* ── Cozy Refresh Wheel ── */
        .refresh {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(15, 20, 30, 0.95);
            border: 1.5px solid rgba(196, 154, 108, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 6px 20px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .refresh.on {
            opacity: 1;
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(196, 154, 108, 0.4);
        }
        .refresh svg {
            position: absolute;
            inset: 4px;
            animation: spin 1.8s linear infinite;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            margin-top: 60px;
            padding-bottom: 24px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* ── Responsive Tree Layout styling ── */
        @media (max-width: 960px) {
            .tree-container {
                gap: 48px;
            }
            .tree-row {
                gap: 24px;
            }
            .row-3 {
                flex-wrap: wrap;
                justify-content: center;
            }
            .row-3 .tree-node, .tree-node {
                width: 265px;
            }
        }
        @media (max-width: 540px) {
            .tree-row {
                flex-direction: column;
                align-items: center;
                gap: 32px;
            }
            .tree-container {
                gap: 48px;
            }
            .tree-node {
                width: 280px;
            }
        }
    </style>
</head>
<body>
<div class="shimmer-overlay"></div>

<div class="container">
    <header>
        <div class="logo-container">
            <div class="logo-glow"></div>
            <img src="assets/logo.svg" alt="Hermes Logo" class="logo">
        </div>
        <h1>Agents Dashboard</h1>
        <p>Hermes Multi-Agent Monitor</p>
        <div class="divider">
            <span>Control Core</span>
        </div>
    </header>
    
    <!-- Dynamic Tree Layout -->
    <div class="tree-container">
        <svg id="treeLinesSvg" class="tree-lines-svg"></svg>
        
        <!-- Row 1: AARZ -->
        <div class="tree-row row-1">
            <div class="tree-node" id="node-aarz"></div>
        </div>
        
        <!-- Row 2: AGY, COPILOT -->
        <div class="tree-row row-2">
            <div class="tree-node" id="node-agy"></div>
            <div class="tree-node" id="node-copilot"></div>
        </div>
        
        <!-- Row 3: NEO, JARVIS, BYMAX, NINA -->
        <div class="tree-row row-3">
            <div class="tree-node" id="node-neo"></div>
            <div class="tree-node" id="node-jarvis"></div>
            <div class="tree-node" id="node-bymax"></div>
            <div class="tree-node" id="node-nina"></div>
        </div>
    </div>
    
    <footer>Auto-refreshes every 30s · system active</footer>
</div>

<div class="refresh" id="refreshRing">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" stroke="var(--gold)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="32 8"/>
    </svg>
</div>

<script>
// Agents data structure with cozy Ghibli colors and icons
const AGENTS = [
    { id: 'aarz',    name: 'Aarz',         role: 'Chief Orchestrator', color: '#c49a6c', dim: 'rgba(196, 154, 108, 0.15)',  icon: 'aarz.svg' },
    { id: 'agy',     name: 'agy',          role: 'Anti-Gravity CLI',   color: '#8bbccc', dim: 'rgba(139, 188, 204, 0.15)',  icon: 'agy.svg' },
    { id: 'copilot', name: 'Copilot CLI',  role: 'Primary Coder',      color: '#7eb5a6', dim: 'rgba(126, 181, 166, 0.15)',  icon: 'copilot.svg' },
    { id: 'neo',     name: 'Neo',          role: 'Agent Mesh',         color: '#e88f70', dim: 'rgba(232, 143, 112, 0.15)',  icon: 'neo.svg' },
    { id: 'jarvis',  name: 'Jarvis',       role: 'n8n Automation',     color: '#d97d64', dim: 'rgba(217, 125, 100, 0.15)',  icon: 'jarvis.svg' },
    { id: 'bymax',   name: 'Bymax',        role: 'LLM Provider',       color: '#a8cbd7', dim: 'rgba(168, 203, 215, 0.15)',  icon: 'bymax.svg' },
    { id: 'nina',    name: 'Nina',         role: 'Research Agent',     color: '#e2b98a', dim: 'rgba(226, 185, 138, 0.15)',  icon: 'nina.svg' },
];

const WORKING_MS = 5 * 60 * 1000;
const REFRESH_MS = 30 * 1000;
const CACHE_TTL_MS = 60 * 1000;

// ── Data fetchers ───────────────────────────────────────────────────────────

async function fetchJSON(url) {
    try {
        const r = await fetch(url);
        return r.ok ? await r.json() : null;
    } catch { return null; }
}

async function fetchDirList(path, ptrn) {
    try {
        const r = await fetch(path);
        if (!r.ok) return [];
        const text = await r.text();
        const rx = new RegExp('<a href="(' + ptrn + ')">', 'g');
        return [...text.matchAll(rx)].map(m => m[1]);
    } catch { return []; }
}

async function getAgyData() {
    const files = await fetchDirList('/.gemini/antigravity-cli/log/', '[^"]+\\.log');
    if (files.length === 0) return null;
    
    files.sort();
    
    let logCache = {};
    try {
        const cachedStr = localStorage.getItem('agy_log_cache');
        if (cachedStr) {
            logCache = JSON.parse(cachedStr);
        }
    } catch (e) {}
    
    let latest = 0;
    const thresholdIndex = Math.max(0, files.length - 2);
    let cacheUpdated = false;
    
    for (let i = 0; i < files.length; i++) {
        const f = files[i];
        let ts = null;
        
        if (i >= thresholdIndex || !logCache[f]) {
            try {
                const r = await fetch('/.gemini/antigravity-cli/log/' + f, { method: 'HEAD' });
                const t = r.headers.get('Last-Modified');
                if (t) {
                    ts = new Date(t).getTime();
                    logCache[f] = ts;
                    cacheUpdated = true;
                }
            } catch (err) {}
        } else {
            ts = logCache[f];
        }
        
        if (ts && ts > latest) latest = ts;
    }
    
    if (cacheUpdated) {
        try {
            localStorage.setItem('agy_log_cache', JSON.stringify(logCache));
        } catch (e) {}
    }
    
    return latest ? { ts: latest } : null;
}

async function getCopilotData() {
    const files = await fetchDirList('/.copilot/logs/', '[^"]+\\.log');
    if (files.length === 0) return null;
    
    files.sort();
    
    let logCache = {};
    try {
        const cachedStr = localStorage.getItem('copilot_log_cache');
        if (cachedStr) {
            logCache = JSON.parse(cachedStr);
        }
    } catch (e) {}
    
    let latest = 0;
    const processFiles = files.filter(f => f.startsWith('process-'));
    const copilotLog = files.find(f => f === 'copilot.log');
    const processThresholdIndex = Math.max(0, processFiles.length - 2);
    let cacheUpdated = false;
    
    const checkFile = async (f, isAlwaysCheck) => {
        let ts = null;
        if (isAlwaysCheck || !logCache[f]) {
            try {
                const r = await fetch('/.copilot/logs/' + f, { method: 'HEAD' });
                const t = r.headers.get('Last-Modified');
                if (t) {
                    ts = new Date(t).getTime();
                    logCache[f] = ts;
                    cacheUpdated = true;
                }
            } catch (err) {}
        } else {
            ts = logCache[f];
        }
        if (ts && ts > latest) latest = ts;
    };
    
    if (copilotLog) {
        await checkFile(copilotLog, true);
    }
    for (let i = 0; i < processFiles.length; i++) {
        const pf = processFiles[i];
        const isRecent = i >= processThresholdIndex;
        await checkFile(pf, isRecent);
    }
    
    if (cacheUpdated) {
        try {
            localStorage.setItem('copilot_log_cache', JSON.stringify(logCache));
        } catch (e) {}
    }
    
    return latest ? { ts: latest } : null;
}

async function getHermesData(profile) {
    const base = '/.hermes/profiles/' + profile;
    const sj = await fetchJSON(base + '/sessions/sessions.json');
    if (sj) {
        let latest = 0;
        for (const s of Object.values(sj)) {
            if (s?.updated_at) {
                const ms = new Date(s.updated_at).getTime();
                if (ms > latest) latest = ms;
            }
        }
        if (latest) return { ts: latest };
    }
    
    const files = await fetchDirList(base + '/sessions/', '[^"]+\\.json');
    if (files.length === 0) return null;
    
    files.sort();
    
    let sessionCache = {};
    try {
        const cachedStr = localStorage.getItem('hermes_cache_' + profile);
        if (cachedStr) {
            sessionCache = JSON.parse(cachedStr);
        }
    } catch (e) {}
    
    let latest = 0;
    const thresholdIndex = Math.max(0, files.length - 2);
    let cacheUpdated = false;
    
    for (let i = 0; i < files.length; i++) {
        const f = files[i];
        let ts = null;
        
        if (i >= thresholdIndex || !sessionCache[f]) {
            const d = await fetchJSON(base + '/sessions/' + f);
            if (d) {
                const val = d.timestamp || d.last_updated;
                if (val) {
                    ts = new Date(val).getTime();
                    sessionCache[f] = ts;
                    cacheUpdated = true;
                }
            }
        } else {
            ts = sessionCache[f];
        }
        
        if (ts && ts > latest) latest = ts;
    }
    
    if (cacheUpdated) {
        try {
            localStorage.setItem('hermes_cache_' + profile, JSON.stringify(sessionCache));
        } catch (e) {}
    }
    
    return latest ? { ts: latest } : null;
}

// ── Formatters ─────────────────────────────────────────────────────────────

function formatAge(ms) {
    if (!ms || ms < 0) return null;
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const h = Math.floor(m / 60);
    const d = Math.floor(h / 24);
    if (s < 60)    return s + 's ago';
    if (m < 60)    return m + 'm ' + (s % 60) + 's ago';
    if (h < 24)    return h + 'h ' + (m % 60) + 'm ago';
    return '~' + d + 'd ' + (h % 24) + 'h ago';
}

function exactTime(ms) {
    return ms ? new Date(ms).toLocaleString() : '—';
}

function barWidth(ms) {
    if (!ms) return 0;
    const h = ms / 1000 / 60 / 60;
    if (h < 1)  return 100;
    if (h < 24) return Math.max(8, 100 - h * 1.5);
    if (h < 168)return Math.max(4, 60 - (h - 24) * 0.5);
    return 4;
}

// ── Renderer ───────────────────────────────────────────────────────────────

function cardHTML(agent, data) {
    const now = Date.now();
    const ts = data?.ts || 0;
    const age = ts ? now - ts : 0;
    const working = age < WORKING_MS && age > 0;
    const ageStr = formatAge(age);
    const bar = barWidth(age);

    return `<div class="card ${working ? 'active-core' : ''}" id="card-${agent.id}" style="--agent-color: ${agent.color}; --agent-dim: ${agent.dim};">
  <div class="card-shimmer"></div>
  <div class="card-top">
    <div class="avatar-container">
        <div class="status-arc"></div>
        <div class="status-arc-inner"></div>
        <div class="avatar">
            <img src="assets/${agent.icon}" alt="${agent.name} icon">
        </div>
    </div>
    <div class="card-info">
      <div class="card-name">${agent.name}</div>
      <div class="card-role">${agent.role}</div>
    </div>
    <div class="dot ${working ? 'working' : ''}"></div>
  </div>
  <div class="status-row">
    <span class="status-label ${working ? 'working' : ''}">${working ? 'ACTIVE CORE' : 'STANDBY'}</span>
    <span class="time-ago" title="${exactTime(ts)}">${ageStr || 'NO SIGNALS'}</span>
  </div>
  <div class="bar-track">
    <div class="bar-fill" style="width:${bar}%;"></div>
  </div>
  <div class="card-foot">
    <span class="foot-label">Last signal:</span>
    <span class="foot-value">${ts ? new Date(ts).toLocaleString() : 'No connection'}</span>
  </div>
</div>`;
}

// ── Dynamic Tree Connecting Lines ───────────────────────────────────────────

function drawTreeLines() {
    const svg = document.getElementById('treeLinesSvg');
    if (!svg) return;
    svg.innerHTML = '';
    
    const container = document.querySelector('.tree-container');
    if (!container) return;
    const containerRect = container.getBoundingClientRect();
    
    // Connections defining the tree hierarchy
    const connections = [
        { from: 'aarz', to: 'agy' },
        { from: 'aarz', to: 'copilot' },
        { from: 'agy', to: 'neo' },
        { from: 'agy', to: 'jarvis' },
        { from: 'copilot', to: 'bymax' },
        { from: 'copilot', to: 'nina' }
    ];
    
    connections.forEach(conn => {
        const fromEl = document.getElementById('card-' + conn.from);
        const toEl = document.getElementById('card-' + conn.to);
        if (!fromEl || !toEl) return;
        
        const fromRect = fromEl.getBoundingClientRect();
        const toRect = toEl.getBoundingClientRect();
        
        // Coordinates relative to tree container
        const x1 = fromRect.left + fromRect.width / 2 - containerRect.left;
        const y1 = fromRect.bottom - containerRect.top;
        
        const x2 = toRect.left + toRect.width / 2 - containerRect.left;
        const y2 = toRect.top - containerRect.top;
        
        // Beautiful organic s-curve path
        const controlY1 = y1 + (y2 - y1) * 0.45;
        const controlY2 = y1 + (y2 - y1) * 0.55;
        const pathData = `M ${x1} ${y1} C ${x1} ${controlY1}, ${x2} ${controlY2}, ${x2} ${y2}`;
        
        // Main gold vine thread
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', pathData);
        path.setAttribute('stroke', 'rgba(196, 154, 108, 0.35)');
        path.setAttribute('stroke-width', '2.2');
        path.setAttribute('fill', 'none');
        path.classList.add('tree-vine');
        svg.appendChild(path);
        
        // Secondary wrapping sage vine tendril
        const pathTendril = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const pathDataTendril = `M ${x1} ${y1} C ${x1 + 8} ${controlY1 - 2}, ${x2 - 8} ${controlY2 + 2}, ${x2} ${y2}`;
        pathTendril.setAttribute('d', pathDataTendril);
        pathTendril.setAttribute('stroke', 'rgba(126, 181, 166, 0.22)');
        pathTendril.setAttribute('stroke-width', '1.2');
        pathTendril.setAttribute('fill', 'none');
        svg.appendChild(pathTendril);
    });
}

// ── Cache management ────────────────────────────────────────────────────────

function getCached(id) {
    try {
        const c = localStorage.getItem('agent_' + id);
        if (c) {
            const parsed = JSON.parse(c);
            if (Date.now() - parsed.time < CACHE_TTL_MS) return parsed.data;
        }
    } catch {}
    return null;
}

function setCache(id, data) {
    try {
        localStorage.setItem('agent_' + id, JSON.stringify({ time: Date.now(), data }));
    } catch {}
}

function renderCards(results) {
    results.forEach(({ a, d }) => {
        const node = document.getElementById('node-' + a.id);
        if (node) {
            node.innerHTML = cardHTML(a, d);
        }
    });
    drawTreeLines();
}

function updateCard(agent, data) {
    const el = document.getElementById('card-' + agent.id);
    if (el) {
        el.outerHTML = cardHTML(agent, data);
        drawTreeLines();
    }
}

let isFetching = false;

async function loadAll() {
    if (isFetching) return;
    isFetching = true;
    document.getElementById('refreshRing').classList.add('on');
    
    // Instantly render from cache if tree nodes are currently empty
    const firstNode = document.getElementById('node-aarz');
    if (firstNode && !firstNode.innerHTML.trim()) {
        const results = AGENTS.map(a => ({ a, d: getCached(a.id) }));
        renderCards(results);
    }

    // Queue for staggered fetches
    const queue = [...AGENTS];
    
    const fetchWorker = async () => {
        while (queue.length > 0) {
            const a = queue.shift();
            try {
                let d = null;
                if (a.id === 'agy') d = await getAgyData();
                else if (a.id === 'copilot') d = await getCopilotData();
                else d = await getHermesData(a.id);
                
                const old = getCached(a.id);
                if (!old || (d && d.ts !== old.ts)) {
                    setCache(a.id, d);
                    updateCard(a, d);
                } else {
                    setCache(a.id, old); // Refresh cache TTL
                }
            } catch (err) {
                console.error('Fetch error for', a.id, err);
            }
        }
    };

    // Staggered execution of workers to ensure low load and high stability
    await Promise.all([fetchWorker(), fetchWorker()]);

    document.getElementById('refreshRing').classList.remove('on');
    isFetching = false;
    drawTreeLines();
}

// ── Floating particles (Forest soot sprites / warm fireflies) ────────────────

function spawnParticle() {
    const isOrb = Math.random() > 0.75;
    const p = document.createElement('div');
    p.className = isOrb ? 'particle orb' : 'particle star';
    p.style.left = (Math.random() * 100) + 'vw';
    
    if (isOrb) {
        // Large soft glowing warm ambient orb
        const size = 60 + Math.random() * 80;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.animationDuration = (22 + Math.random() * 8) + 's';
        
        const colors = [
            'rgba(196, 154, 108, 0.05)',  // Warm gold
            'rgba(126, 181, 166, 0.04)',  // Cozy sage
            'rgba(139, 188, 204, 0.04)'   // Soft sky
        ];
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.filter = 'blur(20px)';
    } else {
        // Soft drifting forest firefly star
        const size = 1.5 + Math.random() * 2.5;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.borderRadius = '50%';
        p.style.animationDuration = (12 + Math.random() * 8) + 's';
        
        const colors = ['#c49a6c', '#7eb5a6', '#f5f0e6', '#8bbccc'];
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.boxShadow = `0 0 6px ${p.style.background}`;
    }
    
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 25000);
}

// ── Boot ────────────────────────────────────────────────────────────────

loadAll();
setInterval(loadAll, REFRESH_MS);
setInterval(spawnParticle, 1600);

for (let i = 0; i < 12; i++) {
    setTimeout(spawnParticle, i * 600);
}

// Redraw connecting lines on window resize/load to keep alignment perfect
window.addEventListener('resize', drawTreeLines);
window.addEventListener('load', () => {
    drawTreeLines();
    setTimeout(drawTreeLines, 500);
});

// Update card durations/timers every 30 seconds
setInterval(() => {
    if (!isFetching) {
        AGENTS.forEach(a => updateCard(a, getCached(a.id)));
    }
}, 30000);

</script>
